{% load static %}
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-mark-sm">SSP</div>
    <span>RIT Study</span>
  </div>
  <nav class="sidebar-nav">
    <a href="{% url 'dashboard' %}" class="nav-item {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="{% url 'subjects' %}" class="nav-item {% if request.resolver_match.url_name == 'subjects' %}active{% endif %}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Subjects
    </a>
    <a href="{% url 'calendar' %}" class="nav-item {% if request.resolver_match.url_name == 'calendar' %}active{% endif %}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Calendar
    </a>
    <a href="{% url 'generate' %}" class="nav-item {% if request.resolver_match.url_name == 'generate' %}active{% endif %}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      AI Generate
    </a>
    <a href="{% url 'study' %}" class="nav-item {% if request.resolver_match.url_name == 'study' %}active{% endif %}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Study
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="user-avatar">{{ request.user.username|first|upper }}</div>
      <div class="user-info">
        <span class="user-name">{{ request.user.username }}</span>
        <span class="user-major">{{ profile.major }}</span>
      </div>
    </div>
    <a href="{% url 'logout' %}" class="logout-btn">Sign out</a>
  </div>
</aside>
